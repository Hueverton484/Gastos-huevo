<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mis Gastos</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F1F1E">

<!-- iOS app-like -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mis Gastos">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<!-- Conexiones tempranas para acelerar la primera carga -->
<link rel="preconnect" href="https://script.google.com">
<link rel="preconnect" href="https://script.googleusercontent.com">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="dns-prefetch" href="https://script.googleusercontent.com">

<!-- Chart.js (diferido: no bloquea el primer pintado) -->
<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #E8E5DE; min-height: 100vh; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  color: #1F1F1E; font-size: 14px; line-height: 1.5;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
.app {
  max-width: 1080px; margin: 0 auto;
  padding: max(36px, env(safe-area-inset-top, 36px)) max(32px, env(safe-area-inset-right, 32px)) max(80px, calc(env(safe-area-inset-bottom, 0px) + 60px)) max(32px, env(safe-area-inset-left, 32px));
}

/* ── Header band oscuro ── */
.header-band {
  background: linear-gradient(135deg, #1F1F1E 0%, #2D2C28 100%);
  border-radius: 18px; padding: 24px 28px 28px;
  margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}
.header-band .topbar { margin-bottom: 18px; }
.header-band .month-picker { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.75); }
.header-band .month-picker:hover { border-color: rgba(255,255,255,0.25); }
.header-band .refresh-btn { background: transparent; border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.45); }
.header-band .refresh-btn:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8); }
.header-band .header { border-bottom-color: rgba(255,255,255,0.08); margin-bottom: 22px; padding-bottom: 18px; }
.header-band .title { color: #FFFFFF; }
.header-band .subtitle { color: rgba(255,255,255,0.38); }
.header-band .day-info { color: rgba(255,255,255,0.38); }
.header-band .kpi { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.1); }
.header-band .kpi-label { color: rgba(255,255,255,0.38); }
.header-band .kpi-value { color: #FFFFFF; }
.header-band .kpi-hint { color: rgba(255,255,255,0.28); }
.header-band .kpi-delta.pos { color: #6EE7B7; }
.header-band .kpi-delta.neg { color: #FCA5A5; }
.header-band .kpi-delta.neutral { color: rgba(255,255,255,0.3); }

.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.month-picker {
  background: #FFFFFF; border: 1px solid #ECECE8; border-radius: 8px;
  padding: 6px 10px; font-size: 13px; color: #1F1F1E; cursor: pointer; font-family: inherit; outline: none;
}
.month-picker:hover { border-color: #D8D7D0; }
.refresh-btn {
  background: transparent; border: 1px solid #ECECE8; border-radius: 8px;
  padding: 6px 12px; font-size: 13px; color: #79786F; cursor: pointer; font-family: inherit;
}
.refresh-btn:hover { background: #F2F1ED; color: #1F1F1E; }
.refresh-btn:disabled { opacity: 0.5; cursor: wait; }

.header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; padding-bottom: 22px; border-bottom: 1px solid #ECECE8; }
.title { font-size: 24px; font-weight: 500; letter-spacing: -0.02em; }
.subtitle { font-size: 13px; color: #79786F; margin-top: 4px; }
.day-info { font-size: 13px; color: #79786F; font-variant-numeric: tabular-nums; }

.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 0; }
.kpi { background: #FFFFFF; border: 1px solid #ECECE8; border-radius: 12px; padding: 18px 20px; }
.kpi-label { font-size: 11px; color: #79786F; margin-bottom: 8px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
.kpi-value { font-size: 24px; font-weight: 500; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.kpi-hint { font-size: 12px; color: #ABA9A0; margin-top: 6px; }
.kpi-delta { font-size: 12px; margin-top: 4px; font-weight: 500; }
.kpi-delta.neg { color: #A32D2D; }
.kpi-delta.pos { color: #1D9E75; }
.kpi-delta.neutral { color: #ABA9A0; }

/* ── Insights ── */
.insights-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.insight-chip {
  padding: 7px 13px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1px solid transparent; line-height: 1.4;
}
.insight-chip.good  { background: #F0FAF6; color: #0F6E56; border-color: #C6EBD9; }
.insight-chip.warn  { background: #FEF3F0; color: #9B3B1E; border-color: #FACCBB; }
.insight-chip.neutral { background: #F5F3EE; color: #5A5750; border-color: #E0DDD6; }

.row { display: grid; gap: 16px; margin-bottom: 16px; }
.row-2-1 { grid-template-columns: 1.4fr 1fr; }
.row-1-1 { grid-template-columns: 1fr 1fr; }
.row-1-15 { grid-template-columns: 1fr 1.5fr; }

.card { background: #FFFFFF; border: 1px solid #E8E5DE; border-radius: 14px; padding: 22px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; }
.card-title { font-size: 13px; font-weight: 500; color: #1F1F1E; letter-spacing: -0.005em; }
.card-meta { font-size: 12px; color: #79786F; font-variant-numeric: tabular-nums; }

.cat-list { display: flex; flex-direction: column; gap: 14px; }
.cat-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 6px; }
.cat-row .name { color: #1F1F1E; flex: 1; }
.cat-row .amount { color: #79786F; font-variant-numeric: tabular-nums; }
.cat-delta { font-size: 10px; font-weight: 600; margin-left: 8px; padding: 1px 5px; border-radius: 4px; }
.cat-delta.up   { color: #9B3B1E; background: #FEF3F0; }
.cat-delta.down { color: #0F6E56; background: #F0FAF6; }
.adj-note {
  display: inline-block; margin-left: 6px; font-size: 11px; color: #ABA9A0;
  font-style: italic; cursor: help; border-bottom: 1px dotted #D8D7D0;
  font-variant-numeric: tabular-nums;
}
.cat-bar { height: 5px; background: #F2F1ED; border-radius: 3px; overflow: hidden; }
.cat-fill { height: 100%; border-radius: 3px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

/* Chart containers */
.chart-wrap { position: relative; height: 180px; margin-bottom: 20px; }
.chart-wrap-lg { position: relative; height: 260px; }
.chart-wrap-md { position: relative; height: 200px; }

.goal-amount { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
.goal-amount .big { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.goal-amount .small { font-size: 12px; color: #79786F; font-variant-numeric: tabular-nums; }
.goal-bar { height: 5px; background: #F2F1ED; border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
.goal-fill { height: 100%; background: #1D9E75; border-radius: 3px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
.goal-meta { font-size: 12px; color: #79786F; }

.cuota-block { padding-top: 4px; }
.cuota-block + .cuota-block { margin-top: 14px; padding-top: 14px; border-top: 1px solid #F2F1ED; }
.cuota-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; font-size: 13px; }
.cuota-row .name { color: #1F1F1E; }
.cuota-row .progress { color: #79786F; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 12px; }
.cuota-meta { font-size: 12px; color: #79786F; }

.top-list { display: flex; flex-direction: column; }
.top-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; padding: 9px 0; border-bottom: 1px solid #F2F1ED; }
.top-row:last-child { border-bottom: none; padding-bottom: 0; }
.top-row:first-child { padding-top: 0; }
.top-row .left { display: flex; flex-direction: column; gap: 2px; flex: 1; padding-right: 16px; }
.top-row .desc { color: #1F1F1E; }
.top-row .cat { color: #ABA9A0; font-size: 11px; }
.top-row .amt { color: #1F1F1E; font-variant-numeric: tabular-nums; font-weight: 500; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; padding-top: 16px; border-top: 1px solid #F2F1ED; }
.stat-label { font-size: 12px; color: #79786F; margin-bottom: 4px; }
.stat-value { font-size: 16px; font-weight: 500; font-variant-numeric: tabular-nums; }

/* Proyección */
.proj-bar { height: 6px; background: #F2F1ED; border-radius: 3px; overflow: hidden; margin: 10px 0 6px; }
.proj-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

/* Annual summary table */
.annual-table { display: flex; flex-direction: column; max-height: 320px; overflow-y: auto; }
.annual-header {
  display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr;
  padding: 0 0 8px; border-bottom: 2px solid #F2F1ED;
  font-size: 10px; color: #ABA9A0; text-transform: uppercase;
  letter-spacing: 0.04em; font-weight: 600; position: sticky; top: 0; background: #fff;
}
.annual-row {
  display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr;
  padding: 9px 0; border-bottom: 1px solid #F2F1ED;
  font-size: 12px; align-items: center; transition: background 0.15s;
}
.annual-row:last-child { border-bottom: none; }
.annual-row.current { background: #F8F7F3; margin: 0 -24px; padding: 9px 24px; font-weight: 500; }
.annual-month { color: #1F1F1E; font-weight: 500; }
.annual-val { color: #4A4845; font-variant-numeric: tabular-nums; }
.annual-val.red { color: #A32D2D; }
.annual-val.green { color: #0F6E56; }
.annual-val.dim { color: #ABA9A0; }

/* Transaction list */
.tx-filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.tx-search { flex: 1; min-width: 160px; padding: 8px 12px; border: 1px solid #ECECE8; border-radius: 8px; font-size: 13px; font-family: inherit; background: #FFFFFF; color: #1F1F1E; outline: none; }
.tx-search:focus { border-color: #5346B0; }
.tx-cat-filter { padding: 8px 12px; border: 1px solid #ECECE8; border-radius: 8px; font-size: 13px; font-family: inherit; background: #FFFFFF; color: #1F1F1E; outline: none; cursor: pointer; }
.tx-cat-filter:focus { border-color: #5346B0; }
.tx-list { display: flex; flex-direction: column; max-height: 360px; overflow-y: auto; }
.tx-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #F2F1ED; font-size: 13px; }
.tx-row:last-child { border-bottom: none; }
.tx-left { display: flex; flex-direction: column; gap: 2px; flex: 1; padding-right: 12px; }
.tx-desc { color: #1F1F1E; }
.tx-meta { color: #ABA9A0; font-size: 11px; }
.tx-amt { font-variant-numeric: tabular-nums; font-weight: 500; white-space: nowrap; }
.tx-amt.income { color: #1D9E75; }
.tx-empty { font-size: 13px; color: #ABA9A0; padding: 20px 0; text-align: center; }

.empty-state, .loading, .error { text-align: center; padding: 80px 20px; color: #79786F; font-size: 14px; }
.error { color: #A32D2D; }
.footer-meta { margin-top: 24px; padding-top: 16px; border-top: 1px solid #ECECE8; font-size: 11px; color: #ABA9A0; text-align: center; }

/* Chat */
.chat-card { margin-top: 0; }
.chat-messages { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; margin-bottom: 14px; padding-right: 4px; }
.chat-empty { font-size: 12px; color: #ABA9A0; padding: 8px 0; }
.chat-msg { padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.5; max-width: 85%; word-wrap: break-word; }
.chat-msg.user { background: #5346B0; color: #FFFFFF; align-self: flex-end; }
.chat-msg.ai { background: #F2F1ED; color: #1F1F1E; align-self: flex-start; white-space: pre-wrap; }
.chat-msg.ai.loading { color: #79786F; font-style: italic; }
.chat-suggestions { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.chat-sugg { padding: 6px 12px; background: transparent; border: 1px solid #ECECE8; border-radius: 16px; font-size: 12px; cursor: pointer; color: #79786F; font-family: inherit; }
.chat-sugg:hover { background: #F2F1ED; color: #1F1F1E; }
.chat-input-row { display: flex; gap: 8px; }
.chat-input { flex: 1; padding: 10px 14px; border: 1px solid #ECECE8; border-radius: 8px; font-size: 14px; font-family: inherit; background: #FFFFFF; color: #1F1F1E; outline: none; }
.chat-input:focus { border-color: #5346B0; }
.chat-send { padding: 10px 18px; background: #1F1F1E; color: #FFFFFF; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; }
.chat-send:disabled { background: #ABA9A0; cursor: wait; }

/* FAB y modal */
.fab {
  position: fixed;
  bottom: max(24px, calc(env(safe-area-inset-bottom, 0px) + 24px));
  right: max(24px, calc(env(safe-area-inset-right, 0px) + 24px));
  width: 56px; height: 56px; background: #1F1F1E; color: #FFFFFF;
  border: none; border-radius: 50%; font-size: 26px; font-weight: 400;
  cursor: pointer; z-index: 100; font-family: inherit; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
}
.fab:hover { background: #5346B0; }
.fab:active { transform: scale(0.95); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal { background: #FFFFFF; border-radius: 16px; padding: 22px 24px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.modal-title { font-size: 16px; font-weight: 500; color: #1F1F1E; }
.modal-close { background: transparent; border: none; cursor: pointer; font-size: 24px; color: #79786F; padding: 0; width: 32px; height: 32px; line-height: 1; font-family: inherit; }
.modal-close:hover { color: #1F1F1E; }
.modal-tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid #ECECE8; }
.modal-tab { background: transparent; border: none; cursor: pointer; padding: 10px 16px; font-size: 13px; color: #79786F; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; font-weight: 500; }
.modal-tab.active { color: #1F1F1E; border-bottom-color: #5346B0; }
.form-section { display: none; flex-direction: column; gap: 10px; }
.form-section.active { display: flex; }
.form-section input, .form-section select { padding: 10px 14px; border: 1px solid #ECECE8; border-radius: 8px; font-size: 14px; font-family: inherit; background: #FFFFFF; color: #1F1F1E; outline: none; width: 100%; }
.form-section input:focus, .form-section select:focus { border-color: #5346B0; }
.form-buttons { display: flex; gap: 8px; margin-top: 8px; }
.btn-cancel, .btn-save { padding: 11px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; border: none; }
.btn-cancel { background: transparent; color: #79786F; flex: 1; border: 1px solid #ECECE8; }
.btn-cancel:hover { background: #F2F1ED; color: #1F1F1E; }
.btn-save { background: #1F1F1E; color: #FFFFFF; flex: 2; }
.btn-save:disabled { background: #ABA9A0; cursor: wait; }
.modal-status { margin-top: 12px; font-size: 13px; text-align: center; min-height: 18px; }
.modal-status.success { color: #1D9E75; }
.modal-status.error { color: #A32D2D; }

@media (max-width: 720px) {
  .app { padding: max(16px, env(safe-area-inset-top, 16px)) max(12px, env(safe-area-inset-right, 12px)) max(60px, calc(env(safe-area-inset-bottom, 0px) + 40px)) max(12px, env(safe-area-inset-left, 12px)); }
  .header-band { border-radius: 14px; padding: 18px 18px 22px; }
  .topbar { flex-wrap: wrap; gap: 8px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .row-2-1, .row-1-1, .row-1-15 { grid-template-columns: 1fr; }
  .header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .annual-header, .annual-row { grid-template-columns: 1.2fr 1fr 1fr 1fr; }
  .annual-header span:nth-child(4), .annual-row span:nth-child(4) { display: none; }
}

/* ═══════════ Animaciones y microinteracciones ═══════════ */
@keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes growX { from { transform: scaleX(0); } to { transform: scaleX(1); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes modalIn { from { opacity: 0; transform: translateY(24px) scale(0.96); } to { opacity: 1; transform: none; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }

/* Glow sutil en el header oscuro */
.header-band { position: relative; overflow: hidden;
  background: radial-gradient(120% 120% at 100% 0%, rgba(83,70,176,0.30) 0%, rgba(83,70,176,0) 42%), linear-gradient(135deg, #1F1F1E 0%, #2D2C28 100%); }

/* Entrada en cascada de los bloques principales */
#app > * { animation: fadeInUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) both; }
#app > *:nth-child(1) { animation-delay: 0s; }
#app > *:nth-child(2) { animation-delay: 0.05s; }
#app > *:nth-child(3) { animation-delay: 0.10s; }
#app > *:nth-child(4) { animation-delay: 0.15s; }
#app > *:nth-child(5) { animation-delay: 0.20s; }
#app > *:nth-child(6) { animation-delay: 0.25s; }
#app > *:nth-child(7) { animation-delay: 0.30s; }
#app > *:nth-child(n+8) { animation-delay: 0.34s; }

/* Tarjetas: elevación al pasar el mouse */
.card { transition: transform 0.22s cubic-bezier(0.4,0,0.2,1), box-shadow 0.22s cubic-bezier(0.4,0,0.2,1); }
.card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.10); }

/* KPIs */
.kpi { transition: transform 0.2s cubic-bezier(0.4,0,0.2,1), background 0.2s ease; }
.header-band .kpi:hover { background: rgba(255,255,255,0.13); transform: translateY(-2px); }

/* Insight chips */
.insight-chip { transition: transform 0.16s ease, box-shadow 0.16s ease; cursor: default; }
.insight-chip:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.07); }

/* Botones y controles */
.refresh-btn, .month-picker, .chat-send, .chat-sugg, .btn-save, .btn-cancel, .modal-tab, .tx-search, .tx-cat-filter, .chat-input, .modal-close { transition: all 0.18s ease; }
.chat-send:not(:disabled):hover { background: #5346B0; transform: translateY(-1px); }
.chat-sugg:hover { transform: translateY(-1px); }
.btn-save:not(:disabled):hover { background: #5346B0; }

/* Barras que crecen desde 0 */
.cat-fill, .goal-fill, .proj-fill { transform-origin: left center; animation: growX 0.85s cubic-bezier(0.22,1,0.36,1) 0.25s both; }

/* FAB con rotación */
.fab { transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), background 0.2s ease, box-shadow 0.28s ease; }
.fab:hover { background: #5346B0; transform: scale(1.08) rotate(90deg); box-shadow: 0 8px 26px rgba(83,70,176,0.45); }
.fab:active { transform: scale(0.94) rotate(90deg); }

/* Filas con hover */
.tx-row, .top-row { margin: 0 -10px; padding-left: 10px; padding-right: 10px; border-radius: 8px; transition: background 0.15s ease; }
.tx-row:hover, .top-row:hover { background: #FAF9F5; }
.annual-row:not(.current):hover { background: #FAF9F5; }

/* Mensajes de chat */
.chat-msg { animation: fadeInUp 0.32s cubic-bezier(0.22,1,0.36,1) both; }

/* Modal */
.modal-overlay.show { animation: fadeIn 0.2s ease; }
.modal { animation: modalIn 0.32s cubic-bezier(0.34,1.56,0.64,1); }

/* Spinner del botón actualizar */
.spinner { display: inline-block; width: 11px; height: 11px; border: 2px solid rgba(255,255,255,0.25); border-top-color: rgba(255,255,255,0.85); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: -1px; margin-right: 6px; }

/* Scrollbars finos */
.tx-list::-webkit-scrollbar, .annual-table::-webkit-scrollbar, .chat-messages::-webkit-scrollbar { width: 8px; height: 8px; }
.tx-list::-webkit-scrollbar-track, .annual-table::-webkit-scrollbar-track, .chat-messages::-webkit-scrollbar-track { background: transparent; }
.tx-list::-webkit-scrollbar-thumb, .annual-table::-webkit-scrollbar-thumb, .chat-messages::-webkit-scrollbar-thumb { background: #DDD9D0; border-radius: 4px; }
.tx-list::-webkit-scrollbar-thumb:hover, .annual-table::-webkit-scrollbar-thumb:hover, .chat-messages::-webkit-scrollbar-thumb:hover { background: #C9C4B9; }

/* ── Skeleton loader ── */
.sk-band { background: radial-gradient(120% 120% at 100% 0%, rgba(83,70,176,0.25) 0%, rgba(83,70,176,0) 42%), linear-gradient(135deg,#1F1F1E 0%,#2D2C28 100%); border-radius: 18px; padding: 24px 28px 28px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
.sk-toprow { display: flex; justify-content: space-between; margin-bottom: 24px; }
.sk-dark { background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.05) 75%); background-size: 1000px 100%; animation: shimmer 1.6s infinite linear; border-radius: 8px; }
.sk-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.sk-kpi { height: 94px; border-radius: 12px; background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.05) 75%); background-size: 1000px 100%; animation: shimmer 1.6s infinite linear; }
.sk-chips { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.sk-chip { height: 33px; border-radius: 20px; background: linear-gradient(90deg,#ECEAE3 25%,#F5F3ED 50%,#ECEAE3 75%); background-size: 1000px 100%; animation: shimmer 1.6s infinite linear; }
.sk-grid-21, .sk-grid-11 { display: grid; gap: 16px; margin-bottom: 16px; }
.sk-grid-21 { grid-template-columns: 1.4fr 1fr; }
.sk-grid-11 { grid-template-columns: 1fr 1fr; }
.sk-card { background: #fff; border: 1px solid #E8E5DE; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); position: relative; overflow: hidden; }
.sk-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 25%, rgba(0,0,0,0.03) 50%, transparent 75%); background-size: 1000px 100%; animation: shimmer 1.6s infinite linear; }
.sk-loading-text { text-align: center; color: #ABA9A0; font-size: 12px; margin-top: 22px; letter-spacing: 0.02em; animation: pulse 1.5s ease-in-out infinite; }
@media (max-width: 720px) {
  .sk-kpis { grid-template-columns: repeat(2, 1fr); }
  .sk-grid-21, .sk-grid-11 { grid-template-columns: 1fr; }
}

/* Respeta a quienes prefieren menos movimiento */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div id="app" class="app">
  <div class="sk-band">
    <div class="sk-toprow">
      <div class="sk-dark" style="width:130px;height:32px;"></div>
      <div class="sk-dark" style="width:130px;height:32px;"></div>
    </div>
    <div class="sk-dark" style="width:200px;height:28px;margin-bottom:8px;"></div>
    <div class="sk-dark" style="width:260px;height:14px;margin-bottom:26px;"></div>
    <div class="sk-kpis">
      <div class="sk-kpi"></div><div class="sk-kpi"></div><div class="sk-kpi"></div><div class="sk-kpi"></div>
    </div>
  </div>
  <div class="sk-chips">
    <div class="sk-chip" style="width:200px;"></div>
    <div class="sk-chip" style="width:240px;"></div>
    <div class="sk-chip" style="width:170px;"></div>
  </div>
  <div class="sk-grid-21">
    <div class="sk-card" style="height:400px;"></div>
    <div class="sk-card" style="height:400px;"></div>
  </div>
  <div class="sk-grid-11">
    <div class="sk-card" style="height:240px;"></div>
    <div class="sk-card" style="height:240px;"></div>
  </div>
  <div class="sk-loading-text">Cargando tus finanzas…</div>
</div>

<button class="fab" id="fab-add" aria-label="Cargar gasto o ingreso" title="Cargar nuevo">+</button>

<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Cargar nuevo</div>
      <button class="modal-close" id="modal-close" aria-label="Cerrar">×</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" data-tab="gasto" type="button">Gasto</button>
      <button class="modal-tab" data-tab="ingreso" type="button">Ingreso</button>
    </div>
    <form class="form-section active" id="form-gasto">
      <input type="date" id="g-fecha" required>
      <input type="number" id="g-monto" placeholder="Monto" inputmode="numeric" required min="1" step="any">
      <select id="g-categoria" required></select>
      <input type="text" id="g-descripcion" placeholder="Descripción" required>
      <select id="g-cuenta">
        <option value="">Cuenta / billetera (opcional)</option>
        <option>Efectivo</option>
        <option>Mercado Pago</option>
        <option>Banco / Débito</option>
        <option>Tarjeta de crédito</option>
      </select>
      <div class="form-buttons">
        <button type="button" class="btn-cancel" data-cancel>Cancelar</button>
        <button type="submit" class="btn-save">Cargar gasto</button>

    </form>
    <form class="form-section" id="form-ingreso">
      <input type="date" id="i-fecha" required>
      <input type="number" id="i-monto" placeholder="Monto" inputmode="numeric" required min="1" step="any">
      <input type="text" id="i-descripcion" placeholder="Descripción (ej. Sueldo)" required>
      <div class="form-buttons">
        <button type="button" class="btn-cancel" data-cancel>Cancelar</button>
        <button type="submit" class="btn-save">Cargar ingreso</button>
      </div>
    </form>
    <div class="modal-status" id="modal-status"></div>
  </div>
</div>

<script>
const CATEGORY_COLORS = {
  'Tarjeta de crédito': '#5346B0', 'Otro': '#79786F', 'Comida': '#1D9E75',
  'Salida': '#D85A30', 'Vinilos': '#D4537E', 'Supermercado': '#637042',
  'Cigarrillos': '#BA7517', 'Kiosco': '#BA7517', 'Ocio': '#185FA5',
  'Ropa': '#993556', 'Suscripciones': '#185FA5', 'Compras espontáneas': '#534AB7',
  'Servicios y Hogar': '#0F6E56', 'Transporte': '#888780', 'Salud': '#A32D2D', 'Ahorro': '#1D9E75'
};
const MONTH_NAMES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

let _DATA = null;
let _CURRENT_MONTH = null;
let _CHARTS = {};
let _CACHE_SIG = null;
let _REFRESHING = false;
const CACHE_KEY = 'misgastos_cache_v1';

function fmtMoney(n) {
  if (n == null || isNaN(n)) return '—';
  const sign = n < 0 ? '-' : '';
  return sign + '$' + Math.round(Math.abs(n)).toLocaleString('es-AR');
}
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDateAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return 'hace unos segundos';
  if (diff < 3600) return 'hace ' + Math.floor(diff/60) + ' min';
  if (diff < 86400) return 'hace ' + Math.floor(diff/3600) + ' h';
  return new Date(ts).toLocaleDateString('es-AR');
}
function fmtDelta(curr, prev, upIsBad) {
  if (prev == null || prev === 0) return '';
  const pct = (curr - prev) / Math.abs(prev) * 100;
  if (Math.abs(pct) < 1) return '<span class="kpi-delta neutral">sin cambio</span>';
  const arrow = pct > 0 ? '↑' : '↓';
  const isBad = upIsBad ? pct > 0 : pct < 0;
  return '<span class="kpi-delta ' + (isBad ? 'neg' : 'pos') + '">' + arrow + Math.abs(pct).toFixed(0) + '% vs mes ant.</span>';
}
function destroyCharts() {
  Object.values(_CHARTS).forEach(c => { try { c.destroy(); } catch(e) {} });
  _CHARTS = {};
}

/* ── Insights automáticos ── */
function generateInsights(mes, prevMes, dailyAvg, daysInMonth, noSpendDays, savingsPct) {
  const out = [];

  // Tendencia de gastos vs mes anterior
  if (prevMes && prevMes.totalGastos > 0) {
    const pct = (mes.totalGastos - prevMes.totalGastos) / prevMes.totalGastos * 100;
    if (Math.abs(pct) >= 2) {
      out.push({
        text: 'Gastás ' + Math.abs(pct).toFixed(0) + '% ' + (pct < 0 ? 'menos' : 'más') + ' que el mes pasado',
        good: pct < 0
      });
    }
  }

  // Categoría top
  const topCat = Object.entries(mes.cats || {})
    .filter(([c]) => c !== 'Ahorro').sort(([,a],[,b]) => b - a)[0];
  if (topCat && mes.totalGastos > 0) {
    const pct = (topCat[1] / mes.totalGastos * 100).toFixed(0);
    out.push({ text: 'Mayor categoría: ' + topCat[0] + ' (' + pct + '% del gasto)', good: null });
  }

  // Días sin gastar
  if (noSpendDays > 0) {
    out.push({
      text: noSpendDays + ' día' + (noSpendDays === 1 ? '' : 's') + ' sin gastar este mes',
      good: noSpendDays >= 5
    });
  }

  // Tasa de ahorro
  if (savingsPct > 0) {
    out.push({
      text: 'Ahorro: ' + savingsPct + '% del ingreso' + (savingsPct >= 20 ? ' — ¡buen ritmo!' : ' — meta sugerida 20%'),
      good: savingsPct >= 20
    });
  }

  // Proyección
  if (dailyAvg > 0 && daysInMonth > 0) {
    const projected = Math.round(dailyAvg * daysInMonth);
    out.push({
      text: 'Proyección del mes: ' + fmtMoney(projected) + ' al ritmo actual',
      good: projected <= mes.ingreso
    });
  }

  return out.slice(0, 3);
}

/* ── Distribución semanal ── */
function getWeeklyData(gastos, daysInMonth) {
  const weekCount = Math.ceil(daysInMonth / 7);
  const weeks = Array(weekCount).fill(0);
  gastos.forEach(g => {
    if (!g.fecha || g.cat === 'Ahorro') return;
    const day = parseInt((String(g.fecha || '')).split('-')[2] || '0');
    if (!day) return;
    const idx = Math.min(weekCount - 1, Math.floor((day - 1) / 7));
    weeks[idx] += g.monto || 0;
  });
  return weeks;
}

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtWDa0E_5WK11J_f41zJS57CmD9KY0WAKb6MUq4Z8L4YV09WzPsTgAA7qQ8I0TkZ67fQ/exec';

// Firma de los datos ignorando el timestamp, para detectar cambios reales
function dataSig(d) {
  if (!d) return '';
  try { const { actualizado, ...rest } = d; return JSON.stringify(rest); }
  catch (e) { return JSON.stringify(d); }
}

// Pinta al instante desde la caché local (si existe) mientras llega la data fresca
function renderFromCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return false;
    const cached = JSON.parse(raw);
    if (!cached || !cached.meses || !cached.meses.length) return false;
    _CACHE_SIG = dataSig(cached);
    _DATA = cached;
    if (!_CURRENT_MONTH) _CURRENT_MONTH = cached.meses[0].key;
    render();
    return true;
  } catch (e) { _CACHE_SIG = null; return false; }
}

function load() {
  // En la primera carga, mostramos la caché de inmediato (sensación instantánea)
  _REFRESHING = true;
  if (!_DATA) renderFromCache();

  const cbName = '__loadDashboard_' + Date.now();
  const script = document.createElement('script');
  function cleanup() {
    try { delete window[cbName]; } catch (e) { window[cbName] = undefined; }
    if (script.parentNode) script.parentNode.removeChild(script);
  }
  const timeoutId = setTimeout(() => {
    cleanup();
    onError(new Error('No se pudo cargar (timeout). Verificá que la URL de Apps Script esté bien.'));
  }, 25000);
  window[cbName] = function(data) { clearTimeout(timeoutId); cleanup(); onData(data); };
  script.src = APPS_SCRIPT_URL + '?callback=' + cbName + '&t=' + Date.now();
  script.onerror = function() { clearTimeout(timeoutId); cleanup(); onError(new Error('Error al cargar. Revisá el deployment.')); };
  document.body.appendChild(script);
}

function refresh() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Actualizando…'; }
  load();
}
function clearRefreshing() {
  _REFRESHING = false;
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.disabled = false; btn.innerHTML = 'Actualizar datos'; }
}
function onError(err) {
  _REFRESHING = false;
  // Si ya estamos mostrando datos (de caché), no rompemos la vista: solo limpiamos el spinner
  if (_DATA) { clearRefreshing(); return; }
  document.getElementById('app').innerHTML = '<div class="error">Error: ' + esc(err && err.message ? err.message : err) + '</div>';
}
function onData(data) {
  _REFRESHING = false;
  if (!data.meses || !data.meses.length) {
    if (!_DATA) document.getElementById('app').innerHTML = '<div class="empty-state">No hay gastos cargados todavía.</div>';
    else clearRefreshing();
    return;
  }
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(data)); } catch (e) {}
  // Si la data fresca es igual a la que ya pintamos desde caché, evitamos re-renderizar (sin parpadeo)
  const sig = dataSig(data);
  if (_CACHE_SIG === sig && _DATA) { _CACHE_SIG = null; clearRefreshing(); return; }
  _CACHE_SIG = null;
  _DATA = data;
  if (!_CURRENT_MONTH) _CURRENT_MONTH = data.meses[0].key;
  render();
}

function buildTxList(mes) {
  const gastos = (mes.gastos || []).filter(g => g.cat !== 'Ahorro' && g.monto > 0)
    .map(g => ({ tipo: 'gasto', fecha: g.fecha || '', monto: g.monto, desc: g.desc || '', cat: g.cat || '' }));
  const ingresos = (mes.ingresos || [])
    .map(i => ({ tipo: 'ingreso', fecha: i.fecha || '', monto: i.monto, desc: i.desc || '', cat: 'Ingreso' }));
  return [...gastos, ...ingresos].sort((a, b) => (b.fecha > a.fecha ? 1 : -1));
}
function renderTxRows(list) {
  if (!list.length) return '<div class="tx-empty">Sin movimientos.</div>';
  return list.map(tx => `
    <div class="tx-row">
      <div class="tx-left">
        <span class="tx-desc">${esc((tx.desc || '').trim() || '—')}</span>
        <span class="tx-meta">${esc(tx.cat)}${tx.fecha ? ' · ' + tx.fecha : ''}</span>
      </div>
      <span class="tx-amt ${tx.tipo === 'ingreso' ? 'income' : ''}">${tx.tipo === 'ingreso' ? '+' : ''}${fmtMoney(tx.monto)}</span>
    </div>`).join('');
}

function render() {
  destroyCharts();

  const data = _DATA;
  const mesIndex = data.meses.findIndex(m => m.key === _CURRENT_MONTH);
  const mes = data.meses[mesIndex] || data.meses[0];
  const prevMes = mesIndex < data.meses.length - 1 ? data.meses[mesIndex + 1] : null;

  const monthName = MONTH_NAMES[mes.mesNum];
  const monthLabel = monthName.charAt(0).toUpperCase() + monthName.slice(1) + ' ' + mes.año;
  const daysInMonth = new Date(mes.año, mes.mesNum + 1, 0).getDate();
  const today = new Date();
  const isCurrentMonth = today.getFullYear() === mes.año && today.getMonth() === mes.mesNum;
  const dayOfMonth = isCurrentMonth ? today.getDate() : daysInMonth;
  const daysRemaining = Math.max(0, daysInMonth - dayOfMonth);

  // Categorías con delta vs mes anterior
  const catEntries = Object.entries(mes.cats)
    .filter(([c, v]) => c !== 'Ahorro' && v > 0)
    .map(([name, amount]) => {
      const prevAmt = prevMes && prevMes.cats ? (prevMes.cats[name] || 0) : 0;
      const delta = prevAmt > 0 ? ((amount - prevAmt) / prevAmt * 100) : null;
      return { name, amount, pct: mes.totalGastos > 0 ? amount / mes.totalGastos : 0, delta };
    })
    .sort((a, b) => b.amount - a.amount);

  const top5 = mes.gastos.filter(g => g.cat !== 'Ahorro' && g.monto > 0)
    .sort((a, b) => b.monto - a.monto).slice(0, 5);

  const meta = data.metas && data.metas.length ? data.metas[0] : null;
  const cuotasMes = (data.cuotas || []).filter(c => {
    if (!c.inicio || !c.nCuotas) return false;
    const start = new Date(c.inicio);
    const end = new Date(start.getFullYear(), start.getMonth() + c.nCuotas - 1, 1);
    const cursor = new Date(mes.año, mes.mesNum, 1);
    return cursor <= end && cursor >= new Date(start.getFullYear(), start.getMonth(), 1);
  });

  const dailyFromSaldo = (isCurrentMonth && daysRemaining > 0) ? Math.max(0, mes.saldo / daysRemaining) : 0;
  const dailyAvg = dayOfMonth > 0 ? mes.totalGastos / dayOfMonth : 0;
  const noSpendDays = Math.max(0, dayOfMonth - mes.diasConGasto);
  const savingsPct = mes.ingreso > 0 ? Math.round(mes.totalAhorro / mes.ingreso * 100) : 0;
  const projected = isCurrentMonth ? Math.round(dailyAvg * daysInMonth) : mes.totalGastos;
  const projPct = mes.ingreso > 0 ? Math.min(100, (projected / mes.ingreso * 100)) : 0;

  const monthOptions = data.meses.map(m => {
    const mn = MONTH_NAMES[m.mesNum];
    const label = mn.charAt(0).toUpperCase() + mn.slice(1) + ' ' + m.año;
    return '<option value="' + m.key + '"' + (m.key === _CURRENT_MONTH ? ' selected' : '') + '>' + label + '</option>';
  }).join('');

  const deltaGastos   = fmtDelta(mes.totalGastos, prevMes && prevMes.totalGastos, true);
  const deltaIngresos = fmtDelta(mes.ingreso,      prevMes && prevMes.ingreso,     false);
  const deltaAhorro   = fmtDelta(mes.totalAhorro,  prevMes && prevMes.totalAhorro, false);
  const deltaSaldo    = fmtDelta(mes.saldo,         prevMes && prevMes.saldo,       false);

  const allTx = buildTxList(mes);
  const uniqueCats = [...new Set(allTx.map(t => t.cat))].sort();
  const evolMeses = [...data.meses].reverse();
  const weeklyData = getWeeklyData(mes.gastos, daysInMonth);
  const insights = generateInsights(mes, prevMes, dailyAvg, daysInMonth, noSpendDays, savingsPct);

  // Resumen anual
  const annualRows = [...data.meses].reverse().map(m => {
    const mn = MONTH_NAMES[m.mesNum];
    const label = mn.charAt(0).toUpperCase() + mn.slice(1, 3) + ' ' + String(m.año).slice(2);
    const isCur = m.key === _CURRENT_MONTH;
    return `<div class="annual-row ${isCur ? 'current' : ''}">
      <span class="annual-month">${label}</span>
      <span class="annual-val green">${fmtMoney(m.ingreso)}</span>
      <span class="annual-val red">${fmtMoney(m.totalGastos)}</span>
      <span class="annual-val">${fmtMoney(m.totalAhorro)}</span>
      <span class="annual-val ${m.saldo < 0 ? 'red' : ''}">${fmtMoney(m.saldo)}</span>
    </div>`;
  }).join('');

  const html = `
    <div class="header-band">
      <div class="topbar">
        <select class="month-picker" id="month-picker">${monthOptions}</select>
        <button class="refresh-btn" id="refresh-btn" onclick="refresh()"${_REFRESHING ? ' disabled' : ''}>${_REFRESHING ? '<span class="spinner"></span>Actualizando…' : 'Actualizar datos'}</button>
      </div>
      <div class="header">
        <div>
          <div class="title">${esc(monthLabel)}</div>
          <div class="subtitle">Finanzas personales · Agustín Devoto</div>
        </div>
        <div class="day-info">${isCurrentMonth ? 'Día ' + dayOfMonth + ' de ' + daysInMonth + ' · ' + daysRemaining + ' restantes' : 'Mes cerrado'}</div>
      </div>
      <div class="kpi-grid">
        <div class="kpi">
          <div class="kpi-label">Ingresos</div>
          <div class="kpi-value" data-count="${mes.ingreso}">${fmtMoney(mes.ingreso)}</div>
          <div class="kpi-hint">${mes.ingresos.length} entrada${mes.ingresos.length === 1 ? '' : 's'}</div>
          ${deltaIngresos}
        </div>
        <div class="kpi">
          <div class="kpi-label">Gastos</div>
          <div class="kpi-value" data-count="${mes.totalGastos}">${fmtMoney(mes.totalGastos)}</div>
          <div class="kpi-hint">${mes.gastos.filter(g => g.cat !== 'Ahorro').length} movimientos</div>
          ${deltaGastos}
        </div>
        <div class="kpi">
          <div class="kpi-label">Ahorro</div>
          <div class="kpi-value" data-count="${mes.totalAhorro}">${fmtMoney(mes.totalAhorro)}</div>
          <div class="kpi-hint">${savingsPct}% del ingreso</div>
          ${deltaAhorro}
        </div>
        <div class="kpi">
          <div class="kpi-label">Saldo</div>
          <div class="kpi-value" data-count="${mes.saldo}" style="color:${mes.saldo < 0 ? '#FCA5A5' : '#FFFFFF'};">${fmtMoney(mes.saldo)}</div>
          <div class="kpi-hint">después de ahorro</div>
          ${deltaSaldo}
        </div>
      </div>
    </div>

    ${insights.length ? `
    <div class="insights-row">
      ${insights.map(i => `<div class="insight-chip ${i.good === true ? 'good' : i.good === false ? 'warn' : 'neutral'}">${esc(i.text)}</div>`).join('')}
    </div>` : ''}

    <div class="row row-2-1">
      <div class="card">
        <div class="card-header">
          <div class="card-title">Gastos por categoría</div>
          <div class="card-meta">${fmtMoney(mes.totalGastos)} total</div>
        </div>
        ${catEntries.length > 0 ? '<div class="chart-wrap"><canvas id="chart-donut"></canvas></div>' : ''}
        <div class="cat-list">

/* ── Conteo animado de los KPIs ── */
function animateCounts() {
  document.querySelectorAll('[data-count]').forEach(el => {
    const target = parseFloat(el.getAttribute('data-count'));
    if (isNaN(target)) return;
    const duration = 750;
    const startT = performance.now();
    function step(now) {
      const p = Math.min(1, (now - startT) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = fmtMoney(target * eased);
      if (p < 1) requestAnimationFrame(step);
      else el.textContent = fmtMoney(target);
    }
    requestAnimationFrame(step);
  });
}

function renderCharts(catEntries, evolMeses, weeklyData, daysInMonth, mesNum, _try) {
  // Chart.js carga diferido: si todavía no está listo, reintentamos en breve
  if (typeof Chart === 'undefined') {
    if ((_try || 0) > 80) return; // ~5s tope: evita loop infinito si el CDN falla
    setTimeout(() => renderCharts(catEntries, evolMeses, weeklyData, daysInMonth, mesNum, (_try || 0) + 1), 60);
    return;
  }
  const tickFont = { size: 11, family: "'Inter', system-ui, sans-serif" };

  // Donut — categorías
  const donutCanvas = document.getElementById('chart-donut');
  if (donutCanvas && catEntries.length > 0) {
    const total = catEntries.reduce((s, c) => s + c.amount, 0);
    _CHARTS.donut = new Chart(donutCanvas, {
      type: 'doughnut',
      data: {
        labels: catEntries.map(c => c.name),
        datasets: [{ data: catEntries.map(c => c.amount), backgroundColor: catEntries.map(c => CATEGORY_COLORS[c.name] || '#888780'), borderWidth: 2, borderColor: '#FFFFFF', hoverBorderWidth: 0 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '65%',
        animation: { animateScale: true, animateRotate: true, duration: 850, easing: 'easeOutQuart' },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ' ' + ctx.label + ': ' + fmtMoney(ctx.raw) + ' (' + (ctx.raw / total * 100).toFixed(0) + '%)' } }
        }
      }
    });
  }

  // Línea — evolución mensual
  const evolCanvas = document.getElementById('chart-evolucion');
  if (evolCanvas && evolMeses.length > 0) {
    const labels = evolMeses.map(m => {
      const mn = MONTH_NAMES[m.mesNum];
      return mn.charAt(0).toUpperCase() + mn.slice(1, 3) + ' ' + String(m.año).slice(2);
    });
    _CHARTS.evolucion = new Chart(evolCanvas, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Ingresos', data: evolMeses.map(m => m.ingreso || 0), borderColor: '#1D9E75', backgroundColor: 'rgba(29,158,117,0.08)', fill: true, tension: 0.35, pointRadius: 4, pointHoverRadius: 6, pointBackgroundColor: '#1D9E75', borderWidth: 2 },
          { label: 'Gastos',   data: evolMeses.map(m => m.totalGastos || 0), borderColor: '#D85A30', backgroundColor: 'rgba(216,90,48,0.06)', fill: true, tension: 0.35, pointRadius: 4, pointHoverRadius: 6, pointBackgroundColor: '#D85A30', borderWidth: 2 },
          { label: 'Ahorro',   data: evolMeses.map(m => m.totalAhorro || 0), borderColor: '#5346B0', backgroundColor: 'transparent', fill: false, tension: 0.35, pointRadius: 3, pointHoverRadius: 5, pointBackgroundColor: '#5346B0', borderWidth: 1.5, borderDash: [4,3] }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 1000, easing: 'easeOutQuart' },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'top', align: 'end', labels: { font: tickFont, color: '#79786F', boxWidth: 10, boxHeight: 10, padding: 16 } },
          tooltip: { callbacks: { label: ctx => ' ' + ctx.dataset.label + ': ' + fmtMoney(ctx.raw) } }
        },
        scales: {
          x: { grid: { color: '#F2F1ED' }, ticks: { font: tickFont, color: '#79786F' } },
          y: { grid: { color: '#F2F1ED' }, ticks: { font: tickFont, color: '#79786F', callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(0) + 'k' : v) } }
        }
      }
    });
  }

  // Barras — distribución semanal
  const semanalCanvas = document.getElementById('chart-semanal');
  if (semanalCanvas && weeklyData.length > 0) {
    const weekLabels = weeklyData.map((_, i) => {
      const start = i * 7 + 1;
      const end = Math.min(daysInMonth, start + 6);
      return start + '–' + end;
    });
    const maxVal = Math.max(...weeklyData, 1);
    _CHARTS.semanal = new Chart(semanalCanvas, {
      type: 'bar',
      data: {
        labels: weekLabels,
        datasets: [{
          label: 'Gastos',
          data: weeklyData,
          backgroundColor: weeklyData.map(v => v === maxVal ? '#D85A30' : 'rgba(216,90,48,0.35)'),
          borderRadius: 6, borderSkipped: false
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 850, easing: 'easeOutQuart', delay(ctx) { return ctx.type === 'data' && ctx.mode === 'default' ? ctx.dataIndex * 90 : 0; } },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ' ' + fmtMoney(ctx.raw) } }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: tickFont, color: '#79786F' } },
          y: { grid: { color: '#F2F1ED' }, ticks: { font: tickFont, color: '#79786F', callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(0) + 'k' : v) } }
        }
      }
    });
  }
}

function setupTransactionSearch(allTx) {
  const searchEl = document.getElementById('tx-search');
  const catEl = document.getElementById('tx-cat-filter');
  const listEl = document.getElementById('tx-list');
  const countEl = document.getElementById('tx-count');
  if (!searchEl || !catEl || !listEl) return;
  function filter() {
    const q = searchEl.value.toLowerCase().trim();
    const cat = catEl.value;
    const filtered = allTx.filter(tx => {
      const matchQ = !q || (tx.desc||'').toLowerCase().includes(q) || (tx.cat||'').toLowerCase().includes(q);
      return matchQ && (!cat || tx.cat === cat);
    });
    listEl.innerHTML = renderTxRows(filtered);
    if (countEl) countEl.textContent = filtered.length + ' movimiento' + (filtered.length === 1 ? '' : 's');
  }
  searchEl.addEventListener('input', filter);
  catEl.addEventListener('change', filter);
}

let _CHAT_HISTORY = [];
const CHAT_HISTORY_LIMIT = 10;
let _ADD_FORM_READY = false;

function setupAddForm() {
  const fab = document.getElementById('fab-add');
  const overlay = document.getElementById('modal-overlay');
  if (!fab || !overlay) return;
  const catSelect = document.getElementById('g-categoria');
  if (catSelect && _DATA && _DATA.categorias) {
    const cats = _DATA.categorias.filter(c => c !== 'Ahorro').concat(['Ahorro']);
    catSelect.innerHTML = '<option value="">Categoría…</option>' + cats.map(c => '<option value="' + esc(c) + '">' + esc(c) + '</option>').join('');
  }
  if (_ADD_FORM_READY) return;
  _ADD_FORM_READY = true;
  const closeBtn = document.getElementById('modal-close');
  const tabs = document.querySelectorAll('.modal-tab');
  const sections = document.querySelectorAll('.form-section');
  const formGasto = document.getElementById('form-gasto');
  const formIngreso = document.getElementById('form-ingreso');
  const today = new Date();
  const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  document.getElementById('g-fecha').value = todayStr;
  document.getElementById('i-fecha').value = todayStr;
  function openModal() { overlay.classList.add('show'); setModalStatus('',''); }
  function closeModal() { overlay.classList.remove('show'); }
  function switchTab(t) {
    tabs.forEach(x => x.classList.toggle('active', x.dataset.tab === t));
    sections.forEach(s => s.classList.toggle('active', s.id === 'form-' + t));
    setModalStatus('','');
  }
  fab.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  document.querySelectorAll('[data-cancel]').forEach(b => b.addEventListener('click', closeModal));
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && overlay.classList.contains('show')) closeModal(); });
  tabs.forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
  formGasto.addEventListener('submit', e => {
    e.preventDefault();
    submitEntry('gasto', { fecha: document.getElementById('g-fecha').value, monto: document.getElementById('g-monto').value, cat: document.getElementById('g-categoria').value, desc: document.getElementById('g-descripcion').value, cuenta: document.getElementById('g-cuenta').value });
  });
  formIngreso.addEventListener('submit', e => {
    e.preventDefault();
    submitEntry('ingreso', { fecha: document.getElementById('i-fecha').value, monto: document.getElementById('i-monto').value, desc: document.getElementById('i-descripcion').value });
  });
}

function setModalStatus(text, kind) {
  const el = document.getElementById('modal-status');
  if (!el) return;
  el.textContent = text; el.className = 'modal-status ' + (kind || '');
}

function submitEntry(tipo, fields) {
  setModalStatus('Guardando…','');
  const saveBtns = document.querySelectorAll('.btn-save');
  saveBtns.forEach(b => b.disabled = true);
  const cbName = '__addEntry_' + Date.now();
  const script = document.createElement('script');
  function cleanup() {
    try { delete window[cbName]; } catch(e) { window[cbName] = undefined; }
    if (script.parentNode) script.parentNode.removeChild(script);
    saveBtns.forEach(b => b.disabled = false);
  }
  const timeoutId = setTimeout(() => { cleanup(); setModalStatus('Tiempo agotado. Probá de nuevo.','error'); }, 15000);
  window[cbName] = function(response) {
    clearTimeout(timeoutId); cleanup();
    if (response && response.ok) {
      setModalStatus('✓ Cargado correctamente','success');
      if (tipo === 'gasto') { document.getElementById('g-monto').value=''; document.getElementById('g-descripcion').value=''; document.getElementById('g-categoria').value=''; document.getElementById('g-cuenta').value=''; }
      else { document.getElementById('i-monto').value=''; document.getElementById('i-descripcion').value=''; }
      setTimeout(() => { document.getElementById('modal-overlay').classList.remove('show'); load(); }, 800);
    } else { setModalStatus('Error: ' + ((response && response.error) || 'desconocido'), 'error'); }
  };
  let url = APPS_SCRIPT_URL + '?action=add_' + tipo + '&callback=' + cbName + '&t=' + Date.now();
  for (const k in fields) { if (fields[k] != null) url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(fields[k]); }
  script.src = url;
  script.onerror = function() { clearTimeout(timeoutId); cleanup(); setModalStatus('Error de conexión.','error'); };
  document.body.appendChild(script);
}

function setupChat() {
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');
  if (!input || !sendBtn) return;
  _CHAT_HISTORY = [];
  sendBtn.addEventListener('click', () => askAssistant(input.value));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') askAssistant(input.value); });
  document.querySelectorAll('.chat-sugg').forEach(btn => {
    btn.addEventListener('click', () => { const q = btn.getAttribute('data-q'); input.value = q; askAssistant(q); });
  });
}

function appendChatMsg(text, kind, id) {
  const el = document.getElementById('chat-messages');
  if (!el) return;
  el.querySelector('.chat-empty')?.remove();
  const div = document.createElement('div');
  div.className = 'chat-msg ' + kind;
  if (id) div.id = id;
  div.textContent = text;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function askAssistant(question) {
  question = (question || '').trim();
  if (!question) return;
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');
  if (input) { input.value = ''; input.disabled = true; }
  if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = 'Pensando…'; }
  appendChatMsg(question, 'user');
  const loadingId = 'chat-loading-' + Date.now();
  appendChatMsg('Pensando…', 'ai loading', loadingId);
  const cbName = '__askDashboard_' + Date.now();
  const script = document.createElement('script');
  function cleanup() {
    try { delete window[cbName]; } catch(e) { window[cbName] = undefined; }
    if (script.parentNode) script.parentNode.removeChild(script);
    if (input) { input.disabled = false; input.focus(); }
    if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = 'Preguntar'; }
  }
  function showAnswer(text) {
    const el = document.getElementById(loadingId);
    if (el) { el.classList.remove('loading'); el.textContent = text; }
  }
  const timeoutId = setTimeout(() => { cleanup(); showAnswer('Tiempo agotado. Probá de nuevo.'); }, 30000);
  window[cbName] = function(response) {
    clearTimeout(timeoutId); cleanup();
    const answer = (response && response.answer) ? response.answer : 'Sin respuesta.';
    showAnswer(answer);
    _CHAT_HISTORY.push({ role: 'user', text: question });
    _CHAT_HISTORY.push({ role: 'model', text: answer });
    if (_CHAT_HISTORY.length > CHAT_HISTORY_LIMIT) _CHAT_HISTORY = _CHAT_HISTORY.slice(-CHAT_HISTORY_LIMIT);
  };
  const historyToSend = _CHAT_HISTORY.slice(-CHAT_HISTORY_LIMIT);
  script.src = APPS_SCRIPT_URL + '?action=ask&callback=' + cbName + '&q=' + encodeURIComponent(question) + '&history=' + encodeURIComponent(JSON.stringify(historyToSend)) + '&t=' + Date.now();
  script.onerror = function() { clearTimeout(timeoutId); cleanup(); showAnswer('Error al consultar al asistente.'); };
  document.body.appendChild(script);
}

function renderGoal(meta) {
  const pct = meta.objetivo > 0 ? meta.acumulado / meta.objetivo : 0;
  const daysLeft = meta.limite ? Math.max(0, Math.ceil((meta.limite - Date.now()) / 86400000)) : 0;
  return `<div class="card">
    <div class="card-header"><div class="card-title">Meta · ${esc(meta.nombre)}</div></div>
    <div class="goal-amount">
      <span class="big">${fmtMoney(meta.acumulado)}</span>
      <span class="small">de ${fmtMoney(meta.objetivo)}</span>
    </div>
    <div class="goal-bar"><div class="goal-fill" style="width:${(pct*100).toFixed(1)}%;"></div></div>
    <div class="goal-meta">${(pct*100).toFixed(0)}% · faltan ${fmtMoney(meta.objetivo - meta.acumulado)}${daysLeft ? ' en ' + daysLeft + ' días' : ''}</div>
  </div>`;
}

function renderCuotas(cuotas, año, mesNum) {
  if (!cuotas.length) return `<div class="card"><div class="card-header"><div class="card-title">Cuotas activas</div></div><div class="goal-meta">Ninguna en curso este mes.</div></div>`;
  return `<div class="card">
    <div class="card-header"><div class="card-title">Cuotas activas</div></div>
    ${cuotas.map(c => {
      const start = new Date(c.inicio);
      const monthlyAmt = c.montoTotal / c.nCuotas;
      const monthsSince = (año - start.getFullYear()) * 12 + (mesNum - start.getMonth());
      const cur = Math.min(c.nCuotas, Math.max(1, monthsSince + 1));
      const rem = Math.max(0, c.nCuotas - cur);
      return `<div class="cuota-block">
        <div class="cuota-row"><span class="name">${esc(c.desc)}</span><span class="progress">${cur}/${c.nCuotas}</span></div>
        <div class="cuota-meta">${fmtMoney(monthlyAmt)}/mes · ${rem === 0 ? 'última cuota' : 'restan ' + rem}</div>
      </div>`;
    }).join('')}
  </div>`;
}

load();
</script>
</body>
</html>
